<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Lee's Trendy Treasures</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <div class="auth-card">
            <img src="../assets/logo.png" alt="Lee's Trendy Treasures Logo" class="site-logo">
            <h2>Create Account</h2>
            <p>Join the community for exclusive offers</p>
            
            <form id="registrationForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your name" required>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="email@example.com" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn">Sign Up</button>
            </form>

            <p class="auth-footer">Already have an account? <a href="login.html">Log In</a></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
