<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LEE'S TRENDY TREASURES</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <main class="login-section">
    <div class="login-card">
        
        <div class="auth-card-logo">
            <a href="index.html">
                <img src="../Assets/logo.PNG" alt="Logo">
            </a>
        </div>
        
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Login to your account for exclusive offers</p>
        
        <form id="login-form" action="index.html">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="........" required>
            </div>

            <button type="submit" class="auth-pink-btn">Log In</button>
        </form>

        <div class="auth-footer-link">
            <span>Don't have an account? </span>
            <a href="register.html">Sign Up</a>
        </div>
        
    </div> 
    </main>
    <footer>
        <p style="text-align: center; padding: 20px; color: #787878; font-size: 0.8rem;">
            &copy; 2026 Lee's Trendy Treasures | Student: Caryl Lee (2305803)
        </p>
    </footer>

</body>
</html>
